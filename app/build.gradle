plugins {
    id 'java'
    id 'application'
    id 'com.gradleup.shadow' version '9.4.1'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    // Spring
    implementation "org.springframework:spring-context:7.0.7"
    implementation "org.springframework:spring-jdbc:7.0.7"
    implementation "org.springframework:spring-webmvc:7.0.7"
    implementation "org.springframework:spring-web:7.0.7"

    // Telegram Bots
    implementation "org.telegram:telegrambots-longpolling:9.5.0"
    implementation "org.telegram:telegrambots-client:9.5.0"

    // JSON-обработка
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.21.2'

    // База данных
    implementation 'org.postgresql:postgresql:42.7.11'
    implementation 'com.zaxxer:HikariCP:7.0.2'

    // Логирование
    implementation 'org.slf4j:slf4j-api:2.0.17'
    implementation 'ch.qos.logback:logback-classic:1.5.32'

    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.1'

    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // This dependency is used by the application.
    implementation 'com.google.guava:guava:33.0.0-jre'
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'ru.spbstu.restaurantadvisor.client.PhotonPlacesClientManualTest'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}